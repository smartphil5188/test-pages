<script>

window.onerror=function(msg,src,line,col){

<style>
  :root {
    --bg: #f5f0eb;
    --card-bg: #fff;
    --shadow: 0 4px 16px rgba(0,0,0,.08);
    --radius: 14px;
    --font: "Microsoft JhengHei","PingFang TC","Noto Sans TC",sans-serif;
    --lesson-color: #e88d67;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:var(--font);background:var(--bg);color:#222;min-height:100vh;font-size:18px;line-height:1.8}
  .site-header{background:linear-gradient(135deg,#ff9a56 0%,#ff6f91 50%,#a855f7 100%);color:#fff;text-align:center;padding:28px 16px 18px}
  .site-header h1{font-size:2.2rem;letter-spacing:2px;text-shadow:0 2px 8px rgba(0,0,0,.15)}
  .site-header p{font-size:1.15rem;margin-top:6px;opacity:.9}
  .tab-bar{display:flex;justify-content:center;flex-wrap:wrap;gap:8px;padding:16px 12px 8px;max-width:900px;margin:0 auto}
  .tab-btn{border:none;border-radius:30px;padding:12px 24px;font-size:1.15rem;font-weight:700;cursor:pointer;transition:all .25s;font-family:var(--font);box-shadow:0 2px 8px rgba(0,0,0,.08);background:#fff;color:#444;margin:4px}
  .tab-btn:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,.13)}
  .tab-btn.active{color:#fff;transform:translateY(-2px)}
  .tab-btn[data-lesson="7"].active{background:#f472b6}
  .tab-btn[data-lesson="8"].active{background:#38bdf8}
  .tab-btn[data-lesson="9"].active{background:#4ade80}
  .tab-btn[data-lesson="10"].active{background:#facc15;color:#333}
  .tab-btn[data-lesson="11"].active{background:#fb923c}
  .tab-btn[data-lesson="12"].active{background:#c084fc}
  .tab-btn[data-lesson="idiom"].active{background:linear-gradient(135deg,#f472b6,#a855f7);color:#fff}
  .tab-btn[data-lesson="idiomQuiz"].active{background:linear-gradient(135deg,#38bdf8,#4ade80);color:#fff}
  .page{display:none;max-width:960px;margin:0 auto;padding:0 16px 40px}
  .page.active{display:block;-webkit-animation:fadeUp .35s ease;animation:fadeUp .35s ease}
  @-webkit-keyframes fadeUp{from{opacity:0;-webkit-transform:translateY(12px)}to{opacity:1;-webkit-transform:translateY(0)}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  .lesson-banner{text-align:center;margin:18px 0 10px;padding:20px;border-radius:var(--radius);color:#fff;font-size:1.15rem;line-height:1.8}
  .lesson-banner h2{font-size:1.6rem;margin-bottom:6px}
  .section-tabs{display:flex;justify-content:center;flex-wrap:wrap;gap:6px;margin:14px 0}
  .sec-btn{border:2px solid var(--lesson-color);border-radius:24px;padding:10px 18px;font-size:1.05rem;font-weight:700;cursor:pointer;transition:all .2s;font-family:var(--font);background:#fff;color:var(--lesson-color);margin:3px}
  .sec-btn.active,.sec-btn:hover{background:var(--lesson-color);color:#fff}
  .section{display:none}
  .section.active{display:block;-webkit-animation:fadeUp .3s ease;animation:fadeUp .3s ease}
  .char-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:14px;margin-top:12px}
  .char-card{background:var(--card-bg);border-radius:var(--radius);box-shadow:var(--shadow);text-align:center;padding:18px 8px 14px;transition:transform .2s,box-shadow .2s}
  .char-card:hover{transform:translateY(-4px) scale(1.03);box-shadow:0 8px 24px rgba(0,0,0,.12)}
  .char-card .big{font-size:3.2rem;line-height:1.1}
  .char-card .zhuyin{display:inline-block;margin-top:6px;padding:4px 12px;border-radius:12px;font-size:1.1rem;font-weight:700;letter-spacing:2px}
  .char-card .char-def{font-size:1rem;color:#555;margin-top:8px;line-height:1.6}
  .vocab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-top:12px}
  .vocab-card{background:var(--card-bg);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;border-left:5px solid var(--lesson-color);transition:transform .2s}
  .vocab-card:hover{transform:translateY(-3px)}
  .vocab-card .word{font-size:1.7rem;font-weight:700}
  .vocab-card .meaning{font-size:1.05rem;color:#444;margin-top:8px;line-height:1.7}
  .quiz-area{margin-top:12px}
  .quiz-card{background:var(--card-bg);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px 20px;margin-bottom:16px}
  .quiz-card .q-num{display:inline-block;border-radius:50%;width:34px;height:34px;line-height:34px;text-align:center;font-weight:700;color:#fff;margin-right:10px;font-size:1rem}
  .quiz-card .q-text{font-size:1.3rem;font-weight:600;line-height:2}
  .quiz-card .q-hint{font-size:1.05rem;color:#666;margin-top:6px}
  .zy-tag{display:inline-block;padding:4px 14px;border-radius:14px;font-size:1.05rem;font-weight:700;letter-spacing:2px;margin-top:8px}
  .fill-row{display:flex;align-items:center;gap:10px;margin-top:14px;flex-wrap:wrap}
  .fill-input{height:54px;font-size:1.8rem;font-weight:700;text-align:center;border:3px solid #ccc;border-radius:12px;outline:none;font-family:var(--font);transition:border-color .2s;background:#fafafa;margin:5px 5px 5px 0}
  .fill-input:focus{border-color:var(--lesson-color);background:#fff}
  .fill-input.correct{border-color:#22c55e!important;background:#dcfce7!important;color:#15803d!important}
  .fill-input.wrong{border-color:#ef4444!important;background:#fee2e2!important;color:#b91c1c!important}
  .fill-input:disabled{opacity:1}
  .submit-btn{height:54px;padding:0 28px;font-size:1.1rem;font-weight:700;border:none;border-radius:12px;cursor:pointer;font-family:var(--font);color:#fff;transition:transform .15s,opacity .2s}
  .submit-btn:hover{transform:scale(1.05)}
  .submit-btn:disabled{opacity:.4;cursor:default;transform:none}
  .q-result{margin-top:10px;padding:12px 16px;border-radius:10px;font-size:1.05rem;display:none;line-height:1.8}
  .q-result.show{display:block;-webkit-animation:fadeUp .25s ease;animation:fadeUp .25s ease}
  .q-result.right{background:#dcfce7;color:#166534}
  .q-result.fail{background:#fee2e2;color:#991b1b}
  .blank-box{display:inline-flex;gap:12px;margin:0 6px;vertical-align:middle}
  .zy-unit{display:inline-block;border-bottom:4px solid;text-align:center;font-size:1.05em;line-height:1.7;font-weight:700;padding:4px 12px;letter-spacing:2px;color:var(--lesson-color,#e88d67);margin:0 6px}
  .score-bar{text-align:center;margin:18px 0 6px;padding:18px;border-radius:var(--radius);background:var(--card-bg);box-shadow:var(--shadow);font-size:1.2rem;font-weight:700}
  .score-bar .score-num{font-size:2rem}
  .reset-btn{display:inline-block;margin-top:10px;border:none;border-radius:24px;padding:10px 32px;font-size:1.1rem;font-weight:700;cursor:pointer;color:#fff;font-family:var(--font);transition:transform .2s}
  .reset-btn:hover{transform:scale(1.05)}
  .idiom-section{max-width:960px;margin:0 auto;padding:0 16px 40px}

  .idiom-card{background:var(--card-bg);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:14px;border-left:5px solid #a855f7;transition:transform .2s;display:flex;gap:16px;align-items:flex-start}
  .idiom-card:hover{transform:translateY(-3px)}
  .idiom-card .idiom-emoji{font-size:2.6rem;line-height:1.2;flex-shrink:0;width:80px;text-align:center}
  .idiom-card .idiom-body{flex:1}
  .idiom-card .idiom-name{font-size:1.8rem;font-weight:700;color:#a855f7}
  .idiom-card .idiom-def{font-size:1.15rem;color:#333;margin-top:8px;line-height:1.8}
  .idiom-card .idiom-illus{font-size:1.05rem;color:#555;margin-top:10px;padding:12px 16px;background:#faf5ff;border-radius:10px;line-height:1.8;border:1px dashed #d8b4fe}
  .idiom-quiz-card{background:var(--card-bg);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px 20px;margin-bottom:16px}

  .idiom-quiz-card .iq-text{font-size:1.3rem;font-weight:600;line-height:2.2}
  .idiom-select{height:50px;font-size:1.2rem;font-weight:700;border:3px solid #ccc;border-radius:12px;padding:0 16px;font-family:var(--font);background:#fafafa;cursor:pointer;outline:none;transition:border-color .2s;min-width:180px;color:#333}
  .idiom-select:focus{border-color:#a855f7}
  .idiom-select.correct{border-color:#22c55e!important;background:#dcfce7!important;color:#15803d!important}
  .idiom-select.wrong{border-color:#ef4444!important;background:#fee2e2!important;color:#b91c1c!important}
  .iq-result{margin-top:8px;padding:10px 16px;border-radius:10px;font-size:1.05rem;display:none;line-height:1.8}
  .iq-result.show{display:block;-webkit-animation:fadeUp .25s ease;animation:fadeUp .25s ease}
  .iq-result.right{background:#dcfce7;color:#166534}
  .iq-result.fail{background:#fee2e2;color:#991b1b}
  .iq-submit-bar{text-align:center;margin:20px 0}
  .iq-submit-btn{border:none;border-radius:30px;padding:16px 52px;font-size:1.25rem;font-weight:700;cursor:pointer;font-family:var(--font);color:#fff;background:linear-gradient(135deg,#38bdf8,#4ade80);box-shadow:0 4px 14px rgba(0,0,0,.12);transition:transform .2s}
  .iq-submit-btn:hover{transform:scale(1.05)}
  .iq-submit-btn:disabled{opacity:.4;cursor:default;transform:none}
  @media(max-width:600px){
    .site-header h1{font-size:1.4rem}
    .tab-btn{padding:8px 14px;font-size:.92rem}
    .sec-btn{padding:6px 10px;font-size:.82rem}
    .char-grid{grid-template-columns:repeat(auto-fill,minmax(95px,1fr));gap:10px}
    .vocab-grid{grid-template-columns:1fr}
    .char-card .big{font-size:2.4rem}
    .fill-input{height:42px;font-size:1.3rem}
  }
  /* ── 全對解鎖對話框 ── */
  #perfect-dialog{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.88);z-index:8888;justify-content:center;align-items:center}
  #perfect-dialog.active{display:flex}
  .perfect-box{background:#111;border:4px solid #FFFF00;border-radius:20px;padding:36px 40px;text-align:center;max-width:480px;width:90%;font-family:var(--font)}
  .perfect-yes{padding:16px 32px;font-size:1.3rem;font-weight:700;cursor:pointer;border:3px solid #FFFF00;border-radius:14px;background:#FFFF00;color:#000;margin:8px;font-family:var(--font)}
  .perfect-no{padding:16px 32px;font-size:1.3rem;font-weight:700;cursor:pointer;border:3px solid #888;border-radius:14px;background:#333;color:#fff;margin:8px;font-family:var(--font)}
  /* ── 遊戲覆蓋層 ── */
  #gm-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:9999;justify-content:center;align-items:center;flex-direction:column;overflow:hidden}
  #gm-overlay.active{display:flex}
  #gm-exit-btn{position:fixed;top:12px;right:16px;z-index:10001;background:#ff4444;color:#fff;border:none;border-radius:10px;padding:10px 18px;font-size:1rem;font-weight:700;cursor:pointer;font-family:var(--font);letter-spacing:1px}
  #gm-exit-btn:hover{background:#cc0000}
  #game-container{position:relative;width:400px;height:720px;display:flex;flex-direction:column}
  #game-container canvas{border:5px solid #FFFF00;background:#001a33;display:block;flex-shrink:0}
  #game-container .overlay{position:absolute;top:0;left:0;width:400px;height:600px;background:rgba(0,0,0,.95);display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:100;color:#FFFF00;text-align:center;border:5px solid #FFFF00;box-sizing:border-box;padding:20px}
  .big-btn{padding:15px;font-size:24px;cursor:pointer;border:3px solid #FFF;border-radius:12px;background:#FFFF00;color:#000;font-weight:bold;width:280px;margin:10px;font-family:var(--font)}
  .desc-text{font-size:16px;color:#FFF;text-align:left;line-height:1.5;margin-bottom:20px;width:100%}
  .touch-controls{width:400px;height:120px;display:flex;justify-content:space-between;align-items:center;background:#111;padding:0 10px;box-sizing:border-box}
  .touch-btn{width:180px;height:90px;background:#333;border:4px solid #FFFF00;border-radius:15px;display:flex;justify-content:center;align-items:center;font-size:45px;color:#FFFF00;user-select:none;touch-action:none}
  .touch-btn.active{background:#FFFF00;color:#000}
  .score-info{position:absolute;top:20px;left:20px;font-size:28px;font-weight:bold;color:#FFFF00;z-index:5;text-shadow:2px 2px #000}
  /* ── iOS WebKit 相容補強 ── */
  html{-webkit-text-size-adjust:100%;-webkit-tap-highlight-color:transparent}
  body{-webkit-overflow-scrolling:touch}
  .page{-webkit-overflow-scrolling:touch;overflow-y:auto}
  .tab-bar,.section-tabs{-webkit-overflow-scrolling:touch}
  .idiom-section{-webkit-overflow-scrolling:touch}
  #gm-overlay{-webkit-overflow-scrolling:touch;overflow-y:auto}
  #game-container .overlay{-webkit-overflow-scrolling:touch;overflow-y:auto}
  input,select,button{-webkit-appearance:none;border-radius:0}
  .fill-input,.idiom-select{-webkit-appearance:none;border-radius:12px}
  /* ── Debug Layer ── */
  #_dbg{display:none;position:fixed;top:0;left:0;right:0;background:#cc0000;color:#fff;font-size:13px;padding:8px 10px;z-index:99999;word-break:break-all;white-space:pre-wrap;max-height:35vh;overflow-y:auto;font-family:monospace;box-sizing:border-box;border-bottom:2px solid #ff6666}
</style>
</head>

// ════════════════ Build UI ════════════════
var tabBar, mainEl;

function _buildLessons(){
  Object.keys(LESSONS).forEach(function(num){
    var L=LESSONS[num];
    var btn=document.createElement("button");
    btn.className="tab-btn"; btn.dataset.lesson=num;
    btn.textContent=L.emoji+" 第"+num+"課";
    btn.onclick=(function(n){return function(){switchLesson(n);};})(num);
    tabBar.appendChild(btn);
    var page=document.createElement("div");
    page.className="page"; page.id="page-"+num;
    page.innerHTML=buildPage(num,L);
    mainEl.appendChild(page);
  });
}

function buildPage(n,L){
  return `
  <div class="lesson-banner" style="background:linear-gradient(135deg,${L.color},${L.color}cc)">
    <h2>${L.emoji} 第${n}課：${L.title}</h2><div>${L.desc}</div>
  </div>
  <div class="section-tabs">
    <button class="sec-btn active" style="--lesson-color:${L.color};border-color:${L.color}" onclick="switchSec(${n},'chars',this)">📝 生字學習</button>
    <button class="sec-btn" style="--lesson-color:${L.color};border-color:${L.color}" onclick="switchSec(${n},'vocab',this)">📖 語詞練習</button>
    <button class="sec-btn" style="--lesson-color:${L.color};border-color:${L.color}" onclick="switchSec(${n},'charQuiz',this)">✏️ 生字測驗</button>
    <button class="sec-btn" style="--lesson-color:${L.color};border-color:${L.color}" onclick="switchSec(${n},'vocabQuiz',this)">📋 語詞測驗</button>
    <button class="sec-btn" style="--lesson-color:${L.color};border-color:${L.color}" onclick="switchSec(${n},'quiz',this)">🎯 同音字測驗</button>
  </div>
  <div class="section active" id="sec-${n}-chars">${buildChars(L)}</div>
  <div class="section" id="sec-${n}-vocab">${buildVocab(L)}</div>
  <div class="section" id="sec-${n}-charQuiz">${buildCharQuiz(n,L)}</div>
  <div class="section" id="sec-${n}-vocabQuiz">${buildVocabQuiz(n,L)}</div>
  <div class="section" id="sec-${n}-quiz">${buildHomophoneQuiz(n,L)}</div>`;
}

function buildChars(L){
  return `<div class="char-grid">${L.chars.map(c=>`
    <div class="char-card">
      <div class="big">${c.ch}</div>
      <div class="zhuyin" style="background:${L.colorLight};color:${L.color}">${c.zy}</div>
      <div class="char-def">${c.def}</div>
    </div>`).join("")}</div>`;
}
function buildVocab(L){
  return `<div class="vocab-grid">${L.vocab.map(v=>`
    <div class="vocab-card" style="border-left-color:${L.color}">
      <div class="word">${v.w}</div>
      <div class="meaning">${v.m}</div>
    </div>`).join("")}</div>`;
}

function zyBoxes(zy,color){
  return `<span class="blank-box">${zy.split(' ').map(s=>`<span class="zy-unit" style="border-color:${color}">${s}</span>`).join('')}</span>`;
}

/* ── 生字測驗：完整句子 ＋ 注音提示，填入正確生字（1字） ── */
function buildCharQuiz(n,L){
  var items=shuffle(L.chars.map(function(c,i){return Object.assign({},c,{idx:i});}));
  const qs=items.map((c,i)=>{
    const display=c.s.replace("＿",zyBoxes(c.zy,L.color));
    return `
    <div class="quiz-card" id="cq-${n}-${i}">
      <span class="q-num" style="background:${L.color}">${i+1}</span>
      <span class="q-text">${display}</span>
      <div class="fill-row">
        <input class="fill-input" style="--lesson-color:${L.color};width:80px" maxlength="1"
               data-ans="${c.ch}" id="cqi-${n}-${i}"
               onkeydown="if(event.key==='Enter')checkFill('cq',${n},${i})">
        <button class="submit-btn" style="background:${L.color}" onclick="checkFill('cq',${n},${i})">確認</button>
      </div>
      <div class="q-result" id="cqr-${n}-${i}"></div>
    </div>`;
  }).join("");
  return `<div class="quiz-area" data-total="${items.length}" data-type="cq" data-lesson="${n}">
    ${qs}${scoreHTML(n,"cq",L.color)}</div>`;
}

/* ── 語詞測驗：完整句子 ＋ 注音提示，填入正確語詞 ── */
function buildVocabQuiz(n,L){
  var items=shuffle(L.vocab.map(function(v,i){return Object.assign({},v,{idx:i});}));
  const qs=items.map((v,i)=>{
    const len=v.w.length;
    const blanks="＿".repeat(len);
    const display=v.s.replace("＿",zyBoxes(v.zy,L.color));
    return `
    <div class="quiz-card" id="vq-${n}-${i}">
      <span class="q-num" style="background:${L.color}">${i+1}</span>
      <span class="q-text">${display}</span>
      <div class="q-hint">共 ${len} 個字</div>
      <div class="fill-row">
        <input class="fill-input" style="--lesson-color:${L.color};width:${Math.max(100,len*52)}px"
               maxlength="${len+2}" data-ans="${v.w}" id="vqi-${n}-${i}"
               onkeydown="if(event.key==='Enter')checkFill('vq',${n},${i})">
        <button class="submit-btn" style="background:${L.color}" onclick="checkFill('vq',${n},${i})">確認</button>
      </div>
      <div class="q-result" id="vqr-${n}-${i}"></div>
    </div>`;
  }).join("");
  return `<div class="quiz-area" data-total="${items.length}" data-type="vq" data-lesson="${n}">
    ${qs}${scoreHTML(n,"vq",L.color)}</div>`;
}

/* ── 同音字測驗：完整句子 ＋ 注音提示，填入正確的字（1字） ── */
function buildHomophoneQuiz(n,L){
  const qs=L.quiz.map((q,i)=>{
    const display=q.q.replace("＿",zyBoxes(q.zy,L.color));
    return `
    <div class="quiz-card" id="hq-${n}-${i}">
      <span class="q-num" style="background:${L.color}">${i+1}</span>
      <span class="q-text">${display}</span>
      <div class="fill-row">
        <input class="fill-input" style="--lesson-color:${L.color};width:80px" maxlength="1"
               data-ans="${q.ans}" data-exp="${encodeURIComponent(q.exp)}" id="hqi-${n}-${i}"
               onkeydown="if(event.key==='Enter')checkFill('hq',${n},${i})">
        <button class="submit-btn" style="background:${L.color}" onclick="checkFill('hq',${n},${i})">確認</button>
      </div>
      <div class="q-result" id="hqr-${n}-${i}"></div>
    </div>`;
  }).join("");
  return `<div class="quiz-area" data-total="${L.quiz.length}" data-type="hq" data-lesson="${n}">
    ${qs}${scoreHTML(n,"hq",L.color)}</div>`;
}

function scoreHTML(n,type,color){
  return `<div class="score-bar" id="score-${type}-${n}" style="display:none">
    <div>🎉 測驗結果</div>
    <div class="score-num" id="sn-${type}-${n}"></div>
    <div><button class="reset-btn" style="background:${color}" onclick="resetQuiz('${type}',${n})">🔄 重新測驗</button></div>
  </div>`;
}

function shuffle(arr){
  var a=arr.slice(0);
  for(var i=a.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var t=a[i];a[i]=a[j];a[j]=t;
  }
  return a;
}

// ════════════════ Quiz Logic ════════════════
var state={};
function gs(t,n){const k=`${t}-${n}`;if(!state[k])state[k]={answered:0,correct:0,done:new Set()};return state[k];}

function checkFill(type,n,i){
  const st=gs(type,n);
  if(st.done.has(i))return;
  const input=document.getElementById(`${type}i-${n}-${i}`);
  const result=document.getElementById(`${type}r-${n}-${i}`);
  const val=input.value.trim();
  if(!val){input.focus();return;}
  st.done.add(i); st.answered++;
  const ans=input.dataset.ans;
  const ok=val===ans;
  const card=document.getElementById(`${type}-${n}-${i}`);
  card.querySelector(".submit-btn").disabled=true;
  input.disabled=true;
  if(ok){
    st.correct++;
    input.classList.add("correct");
    let msg="✅ 正確！好棒！";
    if(input.dataset.exp) msg+=" "+decodeURIComponent(input.dataset.exp);
    result.className="q-result show right";
    result.innerHTML=msg;
  }else{
    input.classList.add("wrong");
    let msg=`❌ 正確答案是「<strong>${ans}</strong>」`;
    if(input.dataset.exp) msg+="。"+decodeURIComponent(input.dataset.exp);
    result.className="q-result show fail";
    result.innerHTML=msg;
  }
  const area=card.closest(".quiz-area");
  const total=parseInt(area.dataset.total);
  if(st.answered>=total){
    const bar=document.getElementById(`score-${type}-${n}`);
    const numEl=document.getElementById(`sn-${type}-${n}`);
    bar.style.display="block";
    const pct=Math.round(st.correct/total*100);
    const e=pct===100?"🌟 滿分！太厲害了！":pct>=80?"👏 很棒！繼續加油！":pct>=60?"😊 不錯喔，再多練習！":"💪 加油，多複習一下！";
    numEl.innerHTML=`${st.correct} / ${total}（${pct} 分）<br><small>${e}</small>`;
    bar.scrollIntoView(true);
  }
}

function resetQuiz(type,n){
  state[`${type}-${n}`]={answered:0,correct:0,done:new Set()};
  document.getElementById(`score-${type}-${n}`).style.display="none";
  const L=LESSONS[n];
  const secKey=type==='cq'?'charQuiz':type==='vq'?'vocabQuiz':'quiz';
  const sec=document.getElementById(`sec-${n}-${secKey}`);
  if(type==='cq')sec.innerHTML=buildCharQuiz(n,L);
  else if(type==='vq')sec.innerHTML=buildVocabQuiz(n,L);
  else sec.innerHTML=buildHomophoneQuiz(n,L);
}

// 從題庫抽 9 題（每個成語最多 1 題）
function pickIdiomQuiz(){
  const byAns={};
  IDIOM_BANK.forEach(q=>{
    if(!byAns[q.ans]) byAns[q.ans]=[];
    byAns[q.ans].push(q);
  });
  const picked=[];
  Object.keys(byAns).forEach(ans=>{
    const arr=byAns[ans];
    picked.push(arr[Math.floor(Math.random()*arr.length)]);
  });
  return shuffle(picked);
}

var currentIQ=[];

function renderIdiomQuiz(){
  currentIQ=pickIdiomQuiz();
  var opts=shuffle(allNames.slice(0)).map(function(n){return '<option value="'+n+'">'+ n+'</option>';}).join("");
  const qHTML=currentIQ.map((q,i)=>{
    const display=q.s.replace("＿＿＿＿",`<select class="idiom-select" id="iq-sel-${i}" data-ans="${q.ans}"><option value="">── 請選擇 ──</option>${opts}</select>`);
    return `<div class="idiom-quiz-card" id="iq-card-${i}">
      <span class="iq-num">${i+1}</span>
      <span class="iq-text">${display}</span>
      <div class="iq-result" id="iq-res-${i}"></div>
    </div>`;
  }).join("");
  document.getElementById("iq-questions").innerHTML=qHTML;
  document.getElementById("iqSubmitBtn").disabled=false;
  document.getElementById("iq-score").style.display="none";
  document.getElementById("iq-after-btns").style.display="none";
}

function submitIdiomQuiz(){
  // 檢查是否每題都已選答
  let allAnswered=true;
  for(let i=0;i<currentIQ.length;i++){
    const sel=document.getElementById(`iq-sel-${i}`);
    if(!sel.value){
      allAnswered=false;
      sel.style.borderColor='#ef4444';
      sel.focus();
      break;
    }
  }
  if(!allAnswered){
    alert('請先完成所有題目再送出批改喔！');
    return;
  }
  let correct=0;
  const total=currentIQ.length;
  currentIQ.forEach((q,i)=>{
    const sel=document.getElementById(`iq-sel-${i}`);
    const res=document.getElementById(`iq-res-${i}`);
    const val=sel.value;
    sel.disabled=true;
    if(val===q.ans){
      correct++;
      sel.classList.add("correct");
      res.className="iq-result show right";
      res.innerHTML="✅ 正確！";
    }else{
      sel.classList.add("wrong");
      res.className="iq-result show fail";
      res.innerHTML=`❌ 正確答案是「<strong>${q.ans}</strong>」`;
    }
  });
  document.getElementById("iqSubmitBtn").disabled=true;
  const bar=document.getElementById("iq-score");
  const numEl=document.getElementById("iq-score-num");
  bar.style.display="block";
  document.getElementById("iq-after-btns").style.display="block";
  const pct=Math.round(correct/total*100);
  const e=pct===100?"🌟 滿分！太厲害了！":pct>=80?"👏 很棒！繼續加油！":pct>=60?"😊 不錯喔，再多練習！":"💪 加油，多複習一下！";
  numEl.innerHTML=`${correct} / ${total}（${pct} 分）<br><small>${e}</small>`;
  bar.scrollIntoView(true);
  if(pct===100){ setTimeout(showPerfectDialog, 800); }
}

function resetIdiomQuiz(){
  // 同樣題目，重新作答
  var opts=shuffle(allNames.slice(0)).map(function(n){return '<option value="'+n+'">'+n+'</option>';}).join("");
  currentIQ.forEach(function(q,i){
    const sel=document.getElementById(`iq-sel-${i}`);
    sel.disabled=false;
    sel.classList.remove("correct","wrong");
    sel.innerHTML='<option value="">── 請選擇 ──</option>'+opts;
    const res=document.getElementById(`iq-res-${i}`);
    res.className="iq-result";res.innerHTML="";
  });
  document.getElementById("iqSubmitBtn").disabled=false;
  document.getElementById("iq-score").style.display="none";
  document.getElementById("iq-after-btns").style.display="none";
}

function newIdiomQuiz(){
  // 重新抽題
  renderIdiomQuiz();

}

function switchLesson(num){
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));

  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(`page-${num}`).classList.add("active");
}
function switchSec(num,sec,btn){
  const page=document.getElementById(`page-${num}`);
  page.querySelectorAll(".sec-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  page.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(`sec-${num}-${sec}`).classList.add("active");
}

<script>
/* ── 遊戲引擎：合併入主程式塊，不再將介面函式挂載到 window ── */
var gmCanvas, gmCtx, gmScoreEl, gmMenuEl, gmGameOverEl;
var score=0, gameActive=false, timer=0;
var currentScrollSpeed, currentGravity, player, platforms, arrows, stones;
var normalWidth=90;
var gmKeys={Left:false,Right:false};

  function getCommentInfo(s){
    if(s<0)return{t:"負債皮卡<br>欠債是要還的分數！",c:"#FF4444"};
    if(s<20)return{t:"新手皮卡<br>踏出第一步！",c:"#FFFFFF"};
    if(s<40)return{t:"入門皮卡<br>掌握基礎了！",c:"#ADFF2F"};
    if(s<60)return{t:"熟練皮卡<br>越來越流暢！",c:"#00FF00"};
    if(s<80)return{t:"進階皮卡<br>閃避飛箭真帥！",c:"#00FA9A"};
    if(s<100)return{t:"資深皮卡<br>樓梯老手！",c:"#00FFFF"};
    if(s<120)return{t:"精英皮卡<br>窄樓梯難不倒你！",c:"#1E90FF"};
    if(s<140)return{t:"大師皮卡<br>完美掌控節奏！",c:"#4169E1"};
    if(s<160)return{t:"傳奇皮卡<br>挑戰石頭攻擊！",c:"#9370DB"};
    if(s<180)return{t:"幻之皮卡<br>輕易閃過巨石！",c:"#8A2BE2"};
    if(s<200)return{t:"至尊皮卡<br>接近神之領域！",c:"#FF00FF"};
    if(s<220)return{t:"超越者皮卡<br>伸縮樓梯之主！",c:"#FF8C00"};
    return{t:"神之皮卡<br>樓梯的最高主宰！",c:"#FFFF00"};
  }

  function gmInitGame(sSpeed,grav){
    score=0;timer=0;gmScoreEl.innerText="0";
    currentScrollSpeed=sSpeed;currentGravity=grav;
    gameActive=true;arrows=[];stones=[];
    player={x:185,y:250,width:30,height:30,vx:0,vy:0,emoji:'\uD83D\uDC39',status:'normal',statusTimer:0};
    platforms=[{x:155,y:320,type:'normal',width:normalWidth,baseWidth:normalWidth,item:null,shrink:false}];
    for(var i=1;i<7;i++) gmAddPlatform(i*100+320);
  }

  function gmAddPlatform(y){
    const isSpiky=Math.random()<0.2;
    let baseW=isSpiky?65:normalWidth;
    if(score>=100) baseW*=(2/3);
    platforms.push({
      x:Math.random()*(gmCanvas.width-baseW),
      y:y||gmCanvas.height,
      type:isSpiky?'spike':'normal',
      width:baseW,baseWidth:baseW,
      shrink:(score>=200&&!isSpiky),
      shrinkPhase:Math.random()*Math.PI*2,
      item:(!isSpiky&&Math.random()<0.6)?gmGetRandomItem():null
    });
  }

  function gmGetRandomItem(){
    const rand=Math.random();
    if(score>=25&&rand<0.15)return{type:'💣',pts:-2};
    if(rand<0.15)return{type:'⚡',pts:5};
    if(rand<0.40)return{type:'🍉',pts:3};
    return{type:'🍓',pts:1};
  }

  function gmStartGame(s,g){
    gmMenuEl.style.display='none';gmGameOverEl.style.display='none';
    gmInitGame(s,g);requestAnimationFrame(gmGameLoop);
  }
  function gmShowDifficulty(){
    document.getElementById('gm-instruction').style.display='none';
    gmMenuEl.style.display='flex';
  }
  function gmResetToMenu(){
    // 密碼對話框
    const dlg=document.getElementById('gm-pwd-dialog');
    document.getElementById('gm-pwd-input').value='';
    document.getElementById('gm-pwd-err').textContent='';
    dlg.style.display='flex';
    setTimeout(()=>document.getElementById('gm-pwd-input').focus(),50);
  }
  function gmConfirmPwd(){
    var val=document.getElementById('gm-pwd-input').value.trim();
    if(val==='34971'){
      document.getElementById('gm-pwd-dialog').style.display='none';
      gmGameOverEl.style.display='none';gmMenuEl.style.display='flex';
    }else{
      document.getElementById('gm-pwd-err').textContent='密碼錯誤，請再試一次！';
      document.getElementById('gm-pwd-input').value='';
      document.getElementById('gm-pwd-input').focus();
    }
  }

  /* ── 事件監聽：包裙 readyState 保護 iOS 本地載入 ── */
  function _gmBindEvents(){
    var bL=document.getElementById('gm-btnLeft');
    var bR=document.getElementById('gm-btnRight');
    if(!bL||!bR){return;}
    bL.addEventListener('pointerdown',function(e){e.preventDefault();gmKeys.Left=true;bL.classList.add('active');});
    bR.addEventListener('pointerdown',function(e){e.preventDefault();gmKeys.Right=true;bR.classList.add('active');});
    window.addEventListener('pointerup',function(){gmKeys.Left=false;gmKeys.Right=false;bL.classList.remove('active');bR.classList.remove('active');});
    window.addEventListener('keydown',function(e){if(e.code==='ArrowLeft')gmKeys.Left=true;if(e.code==='ArrowRight')gmKeys.Right=true;});
    window.addEventListener('keyup',function(e){if(e.code==='ArrowLeft')gmKeys.Left=false;if(e.code==='ArrowRight')gmKeys.Right=false;});
  }
  if(document.readyState==='complete'||document.readyState==='interactive'){
    _gmBindEvents();
  }else{
    document.addEventListener('DOMContentLoaded',_gmBindEvents);
  }

  function gmGameLoop(){if(!gameActive)return;gmUpdate();gmDraw();requestAnimationFrame(gmGameLoop);}

  function gmUpdate(){
    timer+=0.05;
    if(player.statusTimer>0){player.statusTimer--;if(player.statusTimer===0)player.status='normal';}
    if(gmKeys.Left)player.vx=-6;else if(gmKeys.Right)player.vx=6;else player.vx=0;
    player.x+=player.vx;player.vy+=currentGravity;player.y+=player.vy;
    if(player.x<0)player.x=0;if(player.x+30>400)player.x=370;

    if(score>=50&&score<150&&Math.random()<0.03){
      var left=Math.random()>0.5;
      arrows.push({x:left?-30:430,y:Math.random()*450+50,vx:left?5:-5,type:left?'➔':'⬅'});
    }else if(score>=150&&Math.random()<0.04){
      var fl=Math.random()>0.5;
      stones.push({x:fl?0:400,y:Math.random()*150+50,vx:fl?(Math.random()*4+2):-(Math.random()*4+2),vy:-6,g:0.2});
    }
    arrows.forEach(function(a,i){
      a.x+=a.vx;
      if(Math.abs(a.x-player.x)<25&&Math.abs(a.y-player.y)<25){
        score-=5;player.status='shocked';player.statusTimer=20;arrows.splice(i,1);
      }
    });
    stones.forEach(function(s,i){
      s.vy+=s.g;s.x+=s.vx;s.y+=s.vy;
      if(Math.abs(s.x-player.x-15)<20&&Math.abs(s.y-player.y-15)<20){
        score-=10;player.status='stunned';player.statusTimer=30;stones.splice(i,1);
      }
      if(s.y>600)stones.splice(i,1);
    });
    platforms.forEach(function(p,index){
      p.y-=currentScrollSpeed;
      if(p.shrink){var ratio=0.625+Math.sin(timer+p.shrinkPhase)*0.375;p.width=p.baseWidth*ratio;}
      if(player.vy>0&&player.x+30>p.x&&player.x<p.x+p.width&&player.y+30>p.y&&player.y+30<p.y+15+player.vy){
        player.y=p.y-30;player.vy=0;
        if(p.type==='spike')gmShowGameOver("刺到了！");
      }
      if(p.item&&player.x+30>p.x&&player.x<p.x+p.width&&player.y+30>p.y-35&&player.y<p.y){
        if(p.item.type==='💣'){player.status='boom';player.statusTimer=40;}
        score+=p.item.pts;p.item=null;
      }
      if(p.y<-20){platforms.splice(index,1);gmAddPlatform();score++;}
    });
    gmScoreEl.innerText=score;
    if(score<0)gmShowGameOver("分數破產結束！");
    if(player.y>600||player.y<25)gmShowGameOver(player.y<25?"碰到頂部了！":"掉下去了！");
  }

  function gmShowGameOver(msg){
    gameActive=false;
    document.getElementById('gm-finalScore').innerText=score;
    var info=getCommentInfo(score);
    var cm=document.getElementById('gm-commentText');
    cm.innerHTML=info.t;cm.style.color=info.c;
    gmGameOverEl.style.display='flex';
  }

  function gmDraw(){
    gmCtx.clearRect(0,0,400,600);
    gmCtx.fillStyle="#FF5555";
    for(var i=0;i<400;i+=20){gmCtx.beginPath();gmCtx.moveTo(i,0);gmCtx.lineTo(i+10,25);gmCtx.lineTo(i+20,0);gmCtx.fill();}
    platforms.forEach(function(p){
      gmCtx.fillStyle=p.type==='spike'?"#FF0000":"#FFFF00";
      gmCtx.fillRect(p.x,p.y,p.width,15);
      if(p.type==='spike'){
        gmCtx.fillStyle="#FFF";
        for(var i=0;i<p.width;i+=10){gmCtx.beginPath();gmCtx.moveTo(p.x+i,p.y);gmCtx.lineTo(p.x+i+5,p.y-8);gmCtx.lineTo(p.x+i+10,p.y);gmCtx.fill();}
      }else if(p.item){
        gmCtx.font="24px Arial";gmCtx.fillText(p.item.type,p.x+p.width/2-12,p.y-8);
      }
    });
    arrows.forEach(function(a){gmCtx.fillStyle="#00FFFF";gmCtx.font="26px Arial";gmCtx.fillText(a.type,a.x,a.y);});
    stones.forEach(function(s){
      gmCtx.beginPath();gmCtx.arc(s.x+13,s.y-10,15,0,Math.PI*2);gmCtx.fillStyle="#FFFF00";gmCtx.fill();
      gmCtx.beginPath();gmCtx.arc(s.x+13,s.y-10,11,0,Math.PI*2);gmCtx.fillStyle="#555";gmCtx.fill();
      gmCtx.font="16px Arial";gmCtx.fillStyle="white";gmCtx.fillText("🪨",s.x+5,s.y-4);
    });
    var dx=player.x-5,dy=player.y+30,em=player.emoji;
    if(player.status==='boom'){em='💥';dx+=(Math.random()-0.5)*10;dy+=(Math.random()-0.5)*10;}
    else if(player.status==='shocked')em='😲';
    else if(player.status==='stunned')em='😵';
    gmCtx.font="38px Arial";gmCtx.fillText(em,dx,dy);
  }
  /* ── 引擎初始化：連結 DOM 元素 ── */
  function _gmInitElements(){
    gmCanvas=document.getElementById('gm-canvas');
    if(!gmCanvas){return;}
    gmCtx=gmCanvas.getContext('2d');
    gmScoreEl=document.getElementById('gm-score');
    gmMenuEl=document.getElementById('gm-menu');
    gmGameOverEl=document.getElementById('gm-gameOverScreen');
    _gmBindEvents();
  }
  if(document.readyState==='complete'||document.readyState==='interactive'){
    _gmInitElements();
  }else{
    document.addEventListener('DOMContentLoaded',_gmInitElements);
  }
  function gmStopGame(){gameActive=false;}
</script>
